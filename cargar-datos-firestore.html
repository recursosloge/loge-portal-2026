    async function cargarCapacidades() {
      if (!db) { setStatus('❌ Firebase no está conectado', 'error'); return; }
      setStatus('⭐ Cargando capacidades...', 'loading');
      logsArray = [];
      addLog('Iniciando carga de CAPACIDADES...');

      const CAPACIDADES = {
        "1-Otoño": {nombre: "Capacidad reflexiva e integradora",descripcion: "Esta capacidad consiste en interpretar y analizar críticamente los fundamentos antropológicos, epistemológicos y éticos que sustentan los proyectos educativos y las propuestas curriculares."},
        "1-Invierno": {nombre: "Capacidad de diagnóstico, planeamiento, evaluación y supervisión institucional",descripcion: "Esta capacidad consiste en analizar críticamente los paradigmas actuales que influyen en la educación."},
        "1-Primavera": {nombre: "Capacidad de planeamiento institucional y curricular",descripcion: "Esta capacidad se centra en conceptualizar y analizar críticamente teorías y modelos de enseñanza-aprendizaje."},
        "2-Otoño": {nombre: "Capacidad de Gestión y Organización Institucional",descripcion: "Esta capacidad consiste en construir una visión estratégica compartida."},
        "2-Invierno": {nombre: "Capacidad de liderazgo de personas y equipos",descripcion: "Esta capacidad se orienta a motivar, conducir y alinear a las personas y equipos hacia metas comunes."},
        "2-Primavera": {nombre: "Capacidad de Gestión del Cambio para la Mejora",descripcion: "Esta capacidad implica liderar e implementar procesos de transformación institucional orientados a la mejora continua."},
      };

      try {
        let i = 0;
        const keys = Object.keys(CAPACIDADES);
        for (const key of keys) {
          const cap = CAPACIDADES[key];
          await db.collection('capacidades').doc(key).set(cap);
          i++;
          setProgress(i, keys.length);
          addLog(`✅ ${i}/${keys.length}: ${key}`);
        }
        setStatus('✅ Capacidades cargadas correctamente', 'success');
      } catch (e) {
        setStatus('❌ Error: ' + e.message, 'error');
        addLog('❌ Error: ' + e.message);
      }
    }

    async function cargarTodos() {
      document.getElementById('cargarBtn').disabled = true;
      logsArray = [];
      setStatus('🚀 Iniciando carga completa...', 'loading');
      addLog('>>> Iniciando carga completa de datos...\n');

      await cargarSchedule();
      addLog('\n>>> Schedule completado\n');
      await new Promise(r => setTimeout(r, 500));

      await cargarMaterias();
      addLog('\n>>> Materias completado\n');
      await new Promise(r => setTimeout(r, 500));

      await cargarCapacidades();
      addLog('\n>>> Capacidades completado\n');
      await new Promise(r => setTimeout(r, 500));

      await cargarAvisos();
      addLog('\n>>> Avisos completado\n');

      setStatus('🎉 ¡TODOS LOS DATOS CARGADOS CORRECTAMENTE!', 'success');
      document.getElementById('cargarBtn').disabled = false;
    }
